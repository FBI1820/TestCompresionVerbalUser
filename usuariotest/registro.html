<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Participante</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Georama:ital,wght@0,100..900;1,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Pliant:ital,wght@0,100..900;1,100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
  </style>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

</head>
<body>

  <div class="contenedor-principal">
    <div class="tarjeta-registro">
      
      <div class="avatar-superior">
        <span class="material-symbols-outlined">account_circle</span>
      </div>

      <h2>Registro de Participante</h2>
      
      <form id="formularioRegistro" action="guardar_datos.php" method="post">
        
        <div class="grupo-input">
          <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Nombre completo" required>
        </div>

        <div class="fila-inputs">
          <div class="grupo-input">
            <label for="fecha_nacimiento">Fecha de nacimiento</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
          </div>
          <div class="grupo-input">
            <label for="nivel_estudios">Nivel de estudios</label>
            <select id="nivel_estudios" name="nivel_estudios" required>
              <option value="" disabled selected>Selecciona nivel...</option>
              <option value="primaria">Primaria</option>
              <option value="secundaria">Secundaria</option>
              <option value="tecnico">Técnico</option>
              <option value="universitario">Universitario</option>
              <option value="posgrado">Posgrado</option>
            </select>
          </div>
        </div>

        <div class="fila-inputs">
          <div class="grupo-input">
            <label for="inicio_sesion">Inicio de sesión</label>
            <input type="datetime-local" id="inicio_sesion" name="inicio_sesion" required>
          </div>
          <div class="grupo-input">
            <label for="fin_sesion">Fin de sesión</label>
            <input type="datetime-local" id="fin_sesion" name="fin_sesion" required>
          </div>
        </div>

        <div class="grupo-input">
          <input type="text" id="id_unico" name="id_unico" placeholder="Identificador único en BD" required>
        </div>

        <button type="submit" class="btn-guardar">Registrar y Continuar</button>
      </form>

      <div class="acciones-paciente">
        <button type="button" class="btn-secundario" onclick="document.getElementById('formularioRegistro').reset();">Limpiar campos</button>
        <button type="button" class="btn-secundario">Volver al inicio</button>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('formularioRegistro').addEventListener('submit', function(event) {
        event.preventDefault(); // Evita que intente abrir "guardar_datos.php" si no lo tienes configurado aún
        
        // Si llega a este punto, significa que todos los campos 'required' ya fueron llenados correctamente.
        window.location.href = 'test.html'; 
    });
  </script>

</body>

  <style>
    :root {
      --celeste-pastel: #2CACAD; 
      --celeste-principal: #7ed8ff; 
      --celeste-acento: #47cbff;    
      --azul-oscuro: #1C4EA7; 
      --blanco: #ffffff;
      --texto-oscuro: #024D60; 
      --texto-suave: #8a8a8a;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Pliant', sans-serif;
    }

    body {
        background-color: var(--celeste-pastel); 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px;
    }

    .contenedor-principal {
        width: 100%;
        max-width: 500px; 
    }

    .tarjeta-registro {
        background-color: var(--blanco);
        border-radius: 35px;
        padding: 40px 30px 30px 30px;
        box-shadow: 0 15px 35px rgba(28, 78, 167, 0.15); 
        position: relative;
        text-align: center;
        margin-top: 50px;
    }

    .avatar-superior {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        position: absolute;
        top: -50px;
        left: calc(50% - 50px);
        box-shadow: 0 8px 20px rgba(44, 172, 173, 0.3);
        overflow: hidden;
        border: 5px solid var(--blanco);
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Estilo específico para el ícono de persona */
    .avatar-superior .material-symbols-outlined {
        font-size: 65px;
        color: #D9F5F0; /* Tono a juego con el fondo */
        background-color: var(--azul-oscuro);
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .tarjeta-registro h2 {
        font-family: 'Nunito', sans-serif;
        color: var(--texto-oscuro); 
        font-size: 26px;
        font-weight: 800; 
        margin-top: 25px;
        margin-bottom: 30px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .fila-inputs {
        display: flex;
        gap: 15px;
    }

    .fila-inputs .grupo-input {
        flex: 1;
        display: flex;
        flex-direction: column;
        text-align: left;
    }

    .grupo-input label {
        font-size: 0.85rem;
        color: var(--texto-oscuro);
        margin-bottom: 5px;
        font-weight: 600;
        margin-left: 10px;
    }

    .grupo-input input, .grupo-input select {
        width: 100%;
        padding: 15px 20px;
        background-color: #D9F5F0; 
        border: 1px solid rgba(44, 172, 173, 0.3);
        border-radius: 20px;
        font-size: 15px;
        color: var(--texto-oscuro);
        outline: none;
        transition: all 0.3s ease;
        appearance: none; 
    }

    .grupo-input input:focus, .grupo-input select:focus {
        border-color: var(--azul-oscuro);
        box-shadow: 0 0 8px rgba(28, 78, 167, 0.2);
    }

    .grupo-input input::placeholder {
        color: var(--texto-suave);
        font-weight: 400;
    }
    
    .btn-guardar {
        font-family: 'Sour Gummy', sans-serif;
        background-color: var(--azul-oscuro);
        color: white;
        border: none;
        padding: 16px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 25px;
        cursor: pointer;
        margin-top: 15px;
        transition: all 0.2s ease;
    }

    .btn-guardar:hover {
        background-color: #12367a; 
        box-shadow: 0 5px 15px rgba(28, 78, 167, 0.3);
    }

    .btn-guardar:active {
        transform: scale(0.98);
    }

    .acciones-paciente {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(44, 172, 173, 0.2);
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }

    .btn-secundario {
        font-family: 'Georama', sans-serif;
        background: none;
        border: 1px solid var(--celeste-pastel);
        color: var(--texto-oscuro);
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-secundario:hover {
        background-color: var(--celeste-pastel);
        color: white;
    }

    .acciones-paciente:after {
        content: '';
        display: block;
        width: 40px;
        height: 2px;
        background-color: var(--celeste-pastel);
        margin-top: 20px;
        border-radius: 1px;
    }
  </style>
