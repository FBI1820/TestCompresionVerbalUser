<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Participante</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Georama:ital,wght@0,100..900;1,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Pliant:ital,wght@0,100..900;1,100..900&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
  </style>
//fuente de titulo y subtitulo 
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

</head>
<body>

  <div class="contenedor-principal">
    <div class="tarjeta-registro">
      
      <div class="avatar-superior">
        <span class="material-symbols-outlined">account_circle</span>
      </div>

      <h2>Registro de Participante</h2>
      
      <form id="formularioRegistro">
        
        <div class="grupo-input">
          <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Nombre completo" required>
        </div>

        <div class="grupo-input">
          <input type="email" id="email" name="email" placeholder="Correo electrónico (ejemplo@uamv.edu.ni)" required>
        </div>

        <div class="fila-inputs">
          <div class="grupo-input">
            <label for="fecha_nacimiento">Fecha de nacimiento</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
          </div>
          <div class="grupo-input">
            <label for="ocupacion">Ocupación / Estudios</label>
            <input type="text" id="ocupacion" name="ocupacion" placeholder="Ej: Estudiante, Psicólogo" required>
          </div>
        </div>

        <div class="grupo-input">
          <select id="tipo_documento" name="tipo_documento" required onchange="limpiarYAdaptar()">
            <option value="cedula_identidad" selected>Cédula de Identidad</option>
            <option value="cedula_residencia">Cédula de Residencia</option>
          </select>
        </div>

        <div class="grupo-input">
          <input 
            type="text" 
            id="id_unico" 
            name="id_unico" 
            placeholder="Ingrese la cédula (001-000000-0000A)" 
            required
          >
          <p id="mensaje_validacion" style="font-size: 13px; margin-top: 5px; font-weight: bold;"></p>
        </div>

        <button type="submit" class="btn-guardar">Registrar y Continuar</button>
      </form>

      <div class="acciones-paciente">
        <button type="button" class="btn-secundario" onclick="document.getElementById('formularioRegistro').reset(); document.getElementById('mensaje_validacion').textContent='';">Limpiar campos</button>
        <button type="button" class="btn-secundario">Volver al inicio</button>
      </div>

    </div>
  </div>

  <style>
    :root {
      --celeste-pastel: #2CACAD; 
      --celeste-principal: #7ed8ff; 
      --celeste-acento: #47cbff;    
      --azul-oscuro: #1C4EA7; 
      --blanco: #ffffff;
      --texto-oscuro: #024D60; 
      --texto-suave: #8a8a8a;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Pliant', sans-serif;
    }

    body {
        background-color: var(--celeste-pastel); 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px;
    }

    .contenedor-principal {
        width: 100%;
        max-width: 500px; 
    }

    .tarjeta-registro {
        background-color: var(--blanco);
        border-radius: 35px;
        padding: 40px 30px 30px 30px;
        box-shadow: 0 15px 35px rgba(28, 78, 167, 0.15); 
        position: relative;
        text-align: center;
        margin-top: 50px;
    }

    .avatar-superior {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        position: absolute;
        top: -50px;
        left: calc(50% - 50px);
        box-shadow: 0 8px 20px rgba(44, 172, 173, 0.3);
        overflow: hidden;
        border: 5px solid var(--blanco);
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .avatar-superior .material-symbols-outlined {
        font-size: 65px;
        color: #D9F5F0; 
        background-color: var(--azul-oscuro);
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .tarjeta-registro h2 {
        font-family: 'Nunito', sans-serif;
        color: var(--texto-oscuro); 
        font-size: 26px;
        font-weight: 800; 
        margin-top: 25px;
        margin-bottom: 30px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .fila-inputs {
        display: flex;
        gap: 15px;
    }

    .fila-inputs .grupo-input {
        flex: 1;
        display: flex;
        flex-direction: column;
        text-align: left;
    }

    .grupo-input label {
        font-size: 0.85rem;
        color: var(--texto-oscuro);
        margin-bottom: 5px;
        font-weight: 600;
        margin-left: 10px;
    }

    .grupo-input input, .grupo-input select {
        width: 100%;
        padding: 15px 20px;
        background-color: #D9F5F0; 
        border: 1px solid rgba(44, 172, 173, 0.3);
        border-radius: 20px;
        font-size: 15px;
        color: var(--texto-oscuro);
        outline: none;
        transition: all 0.3s ease;
        appearance: none; 
    }

    .grupo-input input:focus, .grupo-input select:focus {
        border-color: var(--azul-oscuro);
        box-shadow: 0 0 8px rgba(28, 78, 167, 0.2);
    }

    .grupo-input input::placeholder {
        color: var(--texto-suave);
        font-weight: 400;
    }
    
    .btn-guardar {
        font-family: 'Sour Gummy', sans-serif;
        background-color: var(--azul-oscuro);
        color: white;
        border: none;
        padding: 16px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 25px;
        cursor: pointer;
        margin-top: 15px;
        transition: all 0.2s ease;
    }

    .btn-guardar:hover {
        background-color: #12367a; 
        box-shadow: 0 5px 15px rgba(28, 78, 167, 0.3);
    }

    .btn-guardar:active {
        transform: scale(0.98);
    }

    .acciones-paciente {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(44, 172, 173, 0.2);
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }

    .btn-secundario {
        font-family: 'Georama', sans-serif;
        background: none;
        border: 1px solid var(--celeste-pastel);
        color: var(--texto-oscuro);
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-secundario:hover {
        background-color: var(--celeste-pastel);
        color: white;
    }

    .acciones-paciente:after {
        content: '';
        display: block;
        width: 40px;
        height: 2px;
        background-color: var(--celeste-pastel);
        margin-top: 20px;
        border-radius: 1px;
    }
  </style>

  <script>
  const formulario = document.getElementById('formularioRegistro');
  const tipoDocumento = document.getElementById('tipo_documento');
  const inputDocumento = document.getElementById('id_unico');
  const mensajeValidacion = document.getElementById('mensaje_validacion');

  tipoDocumento.addEventListener('change', limpiarYAdaptar);

  formulario.addEventListener('submit', function(event) {
    event.preventDefault(); // Detiene recarga o envíos alternos

    const documentoValido = validarDocumentoSeleccionado();

    if (!documentoValido) {
      inputDocumento.focus();
      return;
    }

    // ENLACE DIRECTO CON TU SERVLET API DE OPENXAVA
    const datosParticipante = {
        nombreCompleto: document.getElementById("nombre_completo").value.trim(),
        email: document.getElementById("email").value.trim(),
        tipoDocumento: tipoDocumento.value,
        idUnico: inputDocumento.value.trim(),
        fechaNacimiento: document.getElementById("fecha_nacimiento").value,
        ocupacion: document.getElementById("ocupacion").value.trim(),
        respuestas: "" // Se enviará vacío en el registro inicial
    };

    // Endpoint local de tu Tomcat en OpenXava
    const URL_API = "http://localhost:8080/Comprensi-n-Verbal/api/participante/guardar";

    fetch(URL_API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(datosParticipante)
    })
    .then(response => {
        if (response.ok) {
            return response.json();
        }
        throw new Error("Error en la persistencia del servidor.");
    })
    .then(data => {
        console.log("Éxito en OpenXava:", data);
        alert("¡Registro exitoso! Redireccionando al test...");
        window.location.href = 'Consentimiento.html'; // Pasa al test
    })
    .catch(error => {
        console.error("Error detectado:", error);
        alert("No se pudo conectar con OpenXava. Verifica que tu Tomcat esté encendido.");
    });
  });

  function limpiarYAdaptar() {
    inputDocumento.value = "";
    mensajeValidacion.textContent = "";
    inputDocumento.style.borderColor = "";

    if (tipoDocumento.value === "cedula_identidad") {
      inputDocumento.placeholder = "Ej: 001-010190-0001A";
      inputDocumento.maxLength = 16;
    } else {
      inputDocumento.placeholder = "Ej: 00101019000012";
      inputDocumento.maxLength = 14; // Limitado a la longitud estricta del módulo 11
    }
  }

  function validarDocumentoSeleccionado() {
    const tipo = tipoDocumento.value;
    const valor = inputDocumento.value.trim();

    let esValido = false;
    let textoError = "";

    if (tipo === "cedula_identidad") {
        esValido = validarCedulaNicaragua(valor);
        textoError = "Cédula de identidad inválida. Formato correcto: 001-010190-0001A";
    } else if (tipo === "cedula_residencia") {
        esValido = validarResidenciaNicaragua(valor);
        textoError = "Cédula de residencia no válida (debe tener 14 números sin letras).";
    }

    if (esValido) {
        mostrarMensaje("Formato verificado con éxito ✔", "green");
        inputDocumento.style.borderColor = "green";
        inputDocumento.setCustomValidity(""); 
        return true;
    } else {
        mostrarMensaje(textoError, "red");
        inputDocumento.style.borderColor = "red";
        inputDocumento.setCustomValidity(textoError); 
        return false;
    }
  }

  // ALGORITMOS MATEMÁTICOS DE SEPARACIÓN ABSOLUTA
  function validarCedulaNicaragua(cedula) {
      const regexEstructuraNica = /^\d{3}-?\d{6}-?\d{4}[A-Y]$/i;
      return regexEstructuraNica.test(cedula.trim());
  }

  function validarResidenciaNicaragua(residencia) {
      if (/[A-Z]$/i.test(residencia.trim())) {
          return false;
      }
      const cedulaLimpia = residencia.replace(/[^0-9]/g, "");
      if (cedulaLimpia.length !== 14) {
          return false;
      }

      const cuerpo = cedulaLimpia.slice(0, 13);
      const verificador = parseInt(cedulaLimpia[13], 10);

      let suma = 0;
      let multiplicador = 2;

      for (let i = cuerpo.length - 1; i >= 0; i--) {
          const num = parseInt(cuerpo[i], 10);
          if (isNaN(num)) return false;

          suma += num * multiplicador;
          multiplicador = (multiplicador === 9) ? 2 : multiplicador + 1;
      }

      const digitoEsperado = (11 - (suma % 11)) % 10;
      return digitoEsperado === verificador;
  }

  // Monitoreo en tiempo real al escribir
  inputDocumento.addEventListener("input", function() {
      if (this.value.trim() === "") {
          mensajeValidacion.textContent = "";
          this.style.borderColor = "";
          return;
      }
      validarDocumentoSeleccionado();
  });

  // Candado para bloquear viajeros del tiempo (Años futuros)
  window.addEventListener("DOMContentLoaded", () => {
      const inputFecha = document.getElementById("fecha_nacimiento");
      const hoy = new Date();
      const anio = hoy.getFullYear();
      const mes = String(hoy.getMonth() + 1).padStart(2, '0');
      const dia = String(hoy.getDate()).padStart(2, '0');
      inputFecha.max = `${anio}-${mes}-${dia}`;
  });
  </script>

</body>

  
</html>
